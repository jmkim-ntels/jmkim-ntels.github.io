<!DOCTYPE html>
<html lang="ko">
<head>

  <title>의료-건강-헬스 리포트</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #222; }
    h1 { border-bottom: 3px solid #333; padding-bottom: 10px; }
    .card { background: #f8f9fb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-top: 20px; }
    ul { padding-left: 20px; }
    li { margin: 8px 0; }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background:#eef2ff; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <h1>의료-건강-헬스 리포트</h1>
  <div class="card">
    <p>의료, 건강, 운동, 헬스 관련 리포트 아카이브</p>
    <p>이 섹션은 <code>/medical-health-report/source/</code> 아래에 실제 문서를 보관합니다.</p>
    <p><a href="/">홈으로 돌아가기</a></p>
  </div>
  <div class="card">
    <h2>문서 목록</h2>
    <ul>
      <li>아직 등록된 문서가 없습니다.</li>
    </ul>
  </div>
</body>
</html>
