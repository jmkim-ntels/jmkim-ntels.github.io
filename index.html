<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jmkim-ntels.github.io</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #222; }
    h1 { border-bottom: 3px solid #333; padding-bottom: 10px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
    .card { background: #f8f9fb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 22px; }
    .badge { display: inline-block; font-size: 12px; padding: 4px 8px; border-radius: 999px; background: #e8eefc; color: #1d4ed8; margin-bottom: 12px; }
    .meta { color: #666; }
    ul { padding-left: 20px; }
    li { margin: 8px 0; }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>jmkim-ntels.github.io</h1>
  <p class="meta">리포트와 브리핑 아카이브 홈</p>

  <div class="grid">
    <section class="card">
      <div class="badge">기술 리포트</div>
      <h2>기술 리포트</h2>
      <p>AI, OpenClaw, 빅테크, 심층 기술 문서 아카이브</p>
      <ul><li><a href="/tech-report/">섹션 보기</a></li></ul>
    </section>

    <section class="card">
      <div class="badge">금융-주식 리포트</div>
      <h2>금융-주식 리포트</h2>
      <p>금융, 시장, 주식, 재테크 관련 브리핑 아카이브</p>
      <ul><li><a href="/finance-stock-report/">섹션 보기</a></li></ul>
    </section>

    <section class="card">
      <div class="badge">의료-건강-헬스 리포트</div>
      <h2>의료-건강-헬스 리포트</h2>
      <p>의료, 건강, 운동, 헬스 관련 문서 아카이브</p>
      <ul><li><a href="/medical-health-report/">섹션 보기</a></li></ul>
    </section>

    <section class="card">
      <div class="badge">날씨 리포트</div>
      <h2>날씨 리포트</h2>
      <p>일별 날씨, 시간대별 예보, 복장 추천 리포트 아카이브</p>
      <ul><li><a href="/weather-report/">섹션 보기</a></li></ul>
    </section>
  </div>
</body>
</html>
